name: Daily Auto-Publish

on:
  schedule:
    # CST 7:00 = UTC 23:00 (previous day)
    # Runs 1 hour after hotspot update to ensure fresh data
    - cron: '0 23 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  auto-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run auto-publish pipeline
        env:
          VOLCENGINE_API_KEY: ${{ secrets.VOLCENGINE_API_KEY }}
          WX_APPID: ${{ secrets.WX_APPID }}
          WX_APPSECRET: ${{ secrets.WX_APPSECRET }}
          WX_COVER_MEDIA_ID: ${{ secrets.WX_COVER_MEDIA_ID }}
        run: python scripts/auto-publish.py

      - name: Commit and push changes
        run: |
          git config user.name "JK Automation Bot"
          git config user.email "bot@jk-shrimp.ai"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: publish day article $(date -u +%Y-%m-%d)"
            git push
          fi
